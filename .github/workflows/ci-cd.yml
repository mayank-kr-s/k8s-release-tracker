name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t ${{ env.DOCKER_USERNAME }}/backend:${{ github.sha }} ./backend

      - name: Run Trivy Vulnerability Scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # Set to 1 to fail pipeline on critical vulnerabilities
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Image
        run: docker push ${{ env.DOCKER_USERNAME }}/backend:${{ github.sha }}

      # (Repeat the Build/Scan/Push steps above for the Frontend)

      - name: Update Helm Values (GitOps Trigger)
        run: |
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' helm/backend/values.yaml
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' helm/frontend/values.yaml
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add helm/
          git commit -m "Update image tags to ${{ github.sha }}"
          git push