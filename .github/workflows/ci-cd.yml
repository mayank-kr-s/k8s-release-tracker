name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Analyze Backend Code with SonarQube (SAST)
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
        working-directory: ./backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t ${{ env.DOCKER_USERNAME }}/backend:${{ github.sha }} ./backend

      - name: Run Trivy Vulnerability Scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend Image
        run: docker push ${{ env.DOCKER_USERNAME }}/backend:${{ github.sha }}
      
      - name: Build Frontend Image
        run: docker build -t ${{ env.DOCKER_USERNAME }}/frontend:${{ github.sha }} ./frontend
      
      - name: Run Trivy Vulnerability Scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0' 
          severity: 'CRITICAL,HIGH'
      
      - name: Push Frontend Image
        run: docker push ${{ env.DOCKER_USERNAME }}/frontend:${{ github.sha }}


      - name: Update Helm Values (GitOps Trigger)
        run: |
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' helm/backend/values.yaml
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' helm/frontend/values.yaml
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add helm/
          git commit -m "Update image tags to ${{ github.sha }}"
          git push